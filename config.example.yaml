# ==================== API Configuration ====================
# Get your OpenAI API key from: https://platform.openai.com/api-keys
openai:
  api_key: sk-proj-YOUR_OPENAI_API_KEY_HERE
  model: gpt-4o-mini
  max_tokens: 1000
  temperature: 0.7

# Get your Gemini API key from: https://ai.google.dev/
gemini:
  api_key: YOUR_GEMINI_API_KEY_HERE
  model: gemini-2.5-flash

# ==================== Telegram Configuration ====================
# Get your bot token from: https://t.me/BotFather
telegram:
  bot_token: YOUR_TELEGRAM_BOT_TOKEN_HERE

# ==================== Database Configuration ====================
# PostgreSQL connection string
# Format: postgresql://username:password@host:port/database
database:
  dsn: postgresql://postgres:password@localhost:5432/summariesbotdb

# ==================== Logging Configuration ====================
logging:
  level: INFO
  file: bot.log
  max_file_size_mb: 10
  backup_count: 3

# ==================== System Configuration ====================
system:
  enabled: true

# ==================== Collections (Source/Target Channels) ====================
# Collections define which channels to read from and where to post summaries
collections:
  News:
    name: News Summaries
    source_channels:
      - '@your_source_channel'  # Channel to read messages from
    target_channels:
      - '@your_target_channel'  # Channel to post summaries to
    enabled: true

# ==================== Bots Configuration ====================
bots:
  news_bot:
    enabled: true
    collections:
      - News
    minimum_messages: 1  # Minimum messages needed before generating summary
