<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Summaries Bot Manager — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>

  <!-- Atmospheric background orbs -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-grid"></div>

  <div class="login-wrap">
    <div class="card">

      <!-- Brand -->
      <div class="brand">
        <div class="brand-icon">🤖</div>
        <div class="brand-info">
          <div class="brand-name">Summaries Bot Manager</div>
          <div class="brand-tag">v4.0 · Secure Access</div>
        </div>
      </div>

      <div class="divider"></div>

      <h2 class="card-title">Sign in to your workspace</h2>
      <p class="card-sub">Enter your credentials to continue.</p>

      <!-- Form -->
      <form id="auth-form">

        <div class="field">
          <label for="inp-user">Username</label>
          <input
            type="text"
            id="inp-user"
            autocomplete="username"
            placeholder="Enter username"
            spellcheck="false"
            required
          />
        </div>

        <div class="field">
          <label for="inp-pass">Password</label>
          <div class="pass-wrap">
            <input
              type="password"
              id="inp-pass"
              autocomplete="current-password"
              placeholder="Enter password"
              required
            />
            <button type="button" class="eye-btn" id="eye-btn" onclick="togglePassword()" title="Show / hide">
              <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>

        <!-- Attempts bar -->
        <div class="attempts-row" id="attempts-row">
          <div class="attempts-dots" id="attempts-dots">
            <span class="dot-attempt active" id="dot-1"></span>
            <span class="dot-attempt active" id="dot-2"></span>
            <span class="dot-attempt active" id="dot-3"></span>
            <span class="dot-attempt active" id="dot-4"></span>
            <span class="dot-attempt active" id="dot-5"></span>
          </div>
          <span class="attempts-label" id="attempts-label">5 attempts remaining</span>
        </div>

        <!-- Error -->
        <div class="alert alert-error" id="alert-error">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <span id="alert-text">Invalid credentials.</span>
        </div>

        <!-- Locked alert -->
        <div class="alert alert-locked" id="alert-locked">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <span id="locked-text">Account temporarily locked.</span>
        </div>

        <button type="submit" id="submit-btn">
          <span id="btn-label">Sign In</span>
          <svg id="btn-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
          <svg id="btn-spinner" class="spinner" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="display:none">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
          </svg>
        </button>

      </form>

      <p class="footer-note">🔒 Connection is secure and encrypted</p>
      <p class="footer-note" style="margin-top:8px">Don't have an account? <a href="/register" style="color:var(--accent)">Create one</a></p>

    </div>
  </div>

  <script src="/static/js/login.js"></script>
</body>
</html>
